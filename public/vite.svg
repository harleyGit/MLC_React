<svg width="512" height="486" viewBox="0 0 512 486" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 蓝绿到紫渐变 -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4" />
      <stop offset="50%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
  </defs>
  <!-- 最外层六边形 -->
  <path d="M256 50 L400 130 L400 356 L256 436 L112 356 L112 130 Z" 
        fill="none" stroke="url(#grad)" stroke-width="24" stroke-linejoin="round" />
  <!-- 中间层圆角三角环 -->
  <path d="M256 110 
           C310 110, 355 155, 355 240 
           C355 325, 310 370, 256 370 
           C202 370, 157 325, 157 240 
           C157 155, 202 110, 256 110 Z" 
        fill="none" stroke="url(#grad)" stroke-width="20" stroke-linejoin="round" />
  <!-- 最外层大三角 -->
  <path d="M256 130 L370 370 L142 370 Z" 
        fill="none" stroke="url(#grad)" stroke-width="22" stroke-linejoin="round" />
  <!-- 中心小三角 -->
  <path d="M256 190 L315 310 L197 310 Z" 
        fill="url(#grad)" />
</svg>
